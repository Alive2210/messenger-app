user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Rate limiting zones - INCREASED LIMITS
    # Use binary_remote_addr for efficiency
    limit_req_zone $binary_remote_addr zone=api_limit:20m rate=500r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:20m rate=100r/m;
    limit_req_zone $binary_remote_addr zone=login_limit:20m rate=60r/m;

    # Connection limiting
    limit_conn_zone $binary_remote_addr zone=addr_limit:20m;

    # Performance & Security
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 1024M;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/svg+xml
        image/x-icon
        text/css
        text/plain
        text/x-component;

    # CORS origin map
    map $http_origin $cors_origin {
        default $http_origin;
        "" "*";
    }

    # Upstream for Spring Boot application
    upstream messenger_backend {
        # use host.docker.internal to reach backend running on host OS
        server host.docker.internal:8080;
        keepalive 32;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name _;
        
        # HTTP only for redirects as requested
        location / {
            return 308 https://$host$request_uri;
        }
        
        # Certbot/Let's Encrypt support
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        # SSL Configuration
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;
        
        # Modern SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # HSTS (6 months)
        add_header Strict-Transport-Security "max-age=15768000; includeSubDomains" always;
        
        # Security headers for iOS Safari
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self' http: https: ws: wss: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;

        # Frontend static files - NO RATE LIMITING
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                add_header Access-Control-Allow-Origin $cors_origin always;
            }
        }

        # WebSocket support - NO RATE LIMITING
        location /ws {
            proxy_pass http://messenger_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # WebSocket timeouts
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Auth endpoints - increased limits, options excluded
        location ~ ^/(api/auth/login|api/auth/register) {
            # Don't rate limit preflight OPTIONS requests
            if ($request_method = 'OPTIONS') {
                set $is_options 1;
            }
            
            error_page 429 = @rate_limited;
            
            limit_req zone=login_limit burst=20 nodelay;
            limit_conn addr_limit 10;
            
            proxy_pass http://messenger_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # CORS headers
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS, PATCH, HEAD' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Requested-With, Accept, Origin, X-CSRF-Token, Device-ID, Device-Name, Device-Model, OS-Version, App-Version' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 3600;
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
        }

        # API endpoints - moderate rate limiting, options excluded
        location /api/ {
            # Skip rate limiting for OPTIONS
            set $skip_limit 0;
            if ($request_method = 'OPTIONS') {
                set $skip_limit 1;
            }
            
            limit_req zone=api_limit burst=100 nodelay;
            limit_conn addr_limit 20;
            
            proxy_pass http://messenger_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # CORS headers - critical for iOS Safari
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE, OPTIONS, PATCH, HEAD' always;
            add_header Access-Control-Allow-Headers 'Authorization, Content-Type, X-Requested-With, Accept, Origin, X-CSRF-Token, X-Client-Info, X-Client-Version' always;
            add_header Access-Control-Allow-Credentials 'true' always;
            add_header Access-Control-Max-Age 3600;
            add_header Vary "Origin, Accept-Encoding";
            
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            
            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
        }

        # Health & Actuator - NO RATE LIMITING
        location ~ ^/(actuator/|health) {
            proxy_pass http://messenger_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            access_log off;
        }

        # MinIO proxy
        location /minio/ {
            proxy_pass http://messenger-minio:9000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 120s;
        }

        location @rate_limited {
            add_header Content-Type application/json;
            return 429 '{"status": 429, "error": "Too Many Requests", "message": "Rate limit exceeded. Please try again later."}';
        }
    }
}
